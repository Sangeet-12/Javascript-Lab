<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS - Three Methods Demo</title>


    <link rel="stylesheet" href="styles.css">



    <style>
        
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        
        body {
            font-family: 'Arial', sans-serif;
            
            background-color: #0f766e;
            
            min-height: 100vh;
            
            display: flex;
            flex-direction: column;
            justify-content: center;
            
            padding: 30px;
        }

        
        .container {
            
            max-width: 800px;
            width: 100%;
            
            margin: 0 auto;
        }

        
        h1 {
            
            text-align: center;
            
            color: white;
            
            margin-bottom: 40px;
            
            font-size: 2.5em;
        }

        
        .box {
            
            background-color: white;
            
            border-radius: 15px;
            
            padding: 30px;
            
            margin-bottom: 30px;
            
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
            
            transition: transform 0.3s ease;
        }

        
        .box:hover {
            
            transform: translateY(-5px);
        }

        
        .box h2 {
            
            margin-bottom: 15px;
            
            font-size: 1.8em;
        }

        
        .box p {
            
            line-height: 1.6;
            
            margin-bottom: 20px;
            
            font-size: 1em;
        }

        
        .box button {
            
            padding: 12px 30px;
            
            font-size: 1em;
            
            border: none;
            
            border-radius: 8px;
            
            cursor: pointer;
            
            font-weight: bold;
           
            transition: all 0.3s ease;
        }

        
        .box button:hover {
            
            transform: scale(1.05);
        }

        
        .inline-box {
            
            border-left: 5px solid #FF6B6B;
        }

       
        .inline-box h2 {
            
            color: #FF6B6B;
        }

        
        .internal-box {
            
            border-left: 5px solid #4ECDC4;
        }

        
        .internal-box h2 {
            
            color: #4ECDC4;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1> CSS - Three Methods Demo</h1>

        
        <div class="box inline-box" style="background-color: #FFE5E5; border: 2px solid #FF6B6B;">
            <h2 style="color: #FF6B6B; font-size: 2em;">1️⃣ Inline CSS</h2>
            <p style="color: #333; font-size: 16px; line-height: 1.8;">
                <strong style="color: #FF6B6B; font-size: 24px;">Hello World</strong>
            </p>
            <button style="background-color: #FF6B6B; color: white;" onclick="inlineButtonClick()">
                Click Me!
            </button>
        </div>


        <div class="box internal-box" style="background-color: #E5F9F7;">
            <h2>2️⃣ Internal CSS</h2>
            <p style="color: #333; font-size: 16px; line-height: 1.8;">
                <strong style="color: #4ECDC4; font-size: 24px;">Hello World</strong>
            </p>
            <button style="background-color: #4ECDC4; color: white;" onclick="internalButtonClick()">
                Click Me!
            </button>
        </div>

        <div class="box external-box">
            <h2>3️⃣ External CSS</h2>
            <p style="color: #333; font-size: 16px; line-height: 1.8;">
                <strong style="color: #FFD93D; font-size: 24px;">Hello World</strong>
            </p>
            <button onclick="externalButtonClick()">
                Click Me!
            </button>
        </div>
    </div>

    <script>
        function inlineButtonClick() {
            alert('✅ Inline CSS Button Clicked!\n\nInline styles are applied directly in HTML tags.');
        }

        function internalButtonClick() {
            alert('✅ Internal CSS Button Clicked!\n\nInternal styles are in the <style> tag within HTML.');
        }

        function externalButtonClick() {
            alert('✅ External CSS Button Clicked!\n\nExternal styles are in a separate .css file!');
        }
    </script>
</body>

</html>
